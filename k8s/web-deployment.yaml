apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker-web
  namespace: expense-tracker
  labels:
    app: expense-tracker-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: expense-tracker-web
  template:
    metadata:
      labels:
        app: expense-tracker-web
    spec:
      containers:
        - name: web
          image: expense-tracker-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: expense-tracker-web
  namespace: expense-tracker
  labels:
    app: expense-tracker-web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: expense-tracker-web
