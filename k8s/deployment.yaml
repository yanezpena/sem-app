apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker-api
  namespace: expense-tracker
  labels:
    app: expense-tracker-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: expense-tracker-api
  template:
    metadata:
      labels:
        app: expense-tracker-api
    spec:
      containers:
        - name: api
          image: expense-tracker-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: expense-tracker-api-config
            - secretRef:
                name: expense-tracker-api-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: uploads
              mountPath: /app/apps/api/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: expense-tracker-uploads
---
# Optional: use emptyDir if you don't need persistent uploads (e.g. using S3/R2)
# volumes:
#   - name: uploads
#     emptyDir: {}
