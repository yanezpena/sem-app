# CI: manual run, configured by environment (secrets/vars from GitHub Environment)
name: CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run CI / deploy"
        required: true
        default: "main"
        type: string
      environment:
        description: "Environment to use (configures secrets/vars from GitHub Environment)"
        required: true
        default: "ci"
        type: choice
        options:
          - ci
          - staging
          - production

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + API
        run: pnpm build

      - name: Lint API
        run: pnpm --filter api lint

      - name: Test API
        run: pnpm --filter api test
